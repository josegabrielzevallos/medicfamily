services:
  # PostgreSQL Database
  db:
    image: postgres:18
    container_name: medicfamily-postgres
    environment:
      POSTGRES_DB: medicfamily
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medicfamily"]
      timeout: 20s
      retries: 10
    networks:
      - medicfamily_network

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medicfamily-backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=medicfamily
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-django-insecure-desarrollo-local-cambiar-en-produccion}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - medicfamily_network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medicfamily-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - REACT_APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    networks:
      - medicfamily_network
    # NOTE: no volume mount here — the production Dockerfile builds the app
    # inside the image; mounting ./frontend:/app would overwrite the build folder

volumes:
  postgres_data:

networks:
  medicfamily_network:
    driver: bridge
