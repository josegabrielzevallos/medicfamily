steps:
  # ─────────────────────────────────────────
  # BACKEND
  # ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/medicfamily-backend'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/medicfamily-backend']
    waitFor: ['build-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medicfamily-backend'
      - '--image=${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/medicfamily-backend'
      - '--region=${_DEPLOY_REGION}'
      - '--platform=${_PLATFORM}'
      - '--allow-unauthenticated'
      - '--set-env-vars=^|^DEBUG=False|SECRET_KEY=${_SECRET_KEY}|DB_NAME=${_DB_NAME}|DB_USER=${_DB_USER}|DB_PASSWORD=${_DB_PASSWORD}|DB_HOST=${_DB_HOST}|DB_PORT=5432|ALLOWED_HOSTS=.run.app|GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}'
      - '--min-instances=0'
      - '--max-instances=5'
    waitFor: ['push-backend']

  # ─────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/medicfamily-frontend'
      - '--build-arg'
      - 'REACT_APP_API_URL=${_BACKEND_URL}/api'
      - '--build-arg'
      - 'REACT_APP_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}'
      - './frontend'
    waitFor: ['deploy-backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/medicfamily-frontend']
    waitFor: ['build-frontend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medicfamily-frontend'
      - '--image=${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/medicfamily-frontend'
      - '--region=${_DEPLOY_REGION}'
      - '--platform=${_PLATFORM}'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=5'
    waitFor: ['push-frontend']

images:
  - 'gcr.io/$PROJECT_ID/medicfamily-backend'
  - 'gcr.io/$PROJECT_ID/medicfamily-frontend'

substitutions:
  # Estas variables las sobreescribe el trigger de Cloud Build automaticamente
  _SECRET_KEY: 'cambiar-en-produccion'
  _DB_NAME: 'medicfamily'
  _DB_USER: 'postgres'
  _DB_PASSWORD: 'cambiar-en-produccion'
  _DB_HOST: '35.184.169.73'
  _BACKEND_URL: 'https://medicfamily-backend-42291566189.europe-west1.run.app'
  _DEPLOY_REGION: 'europe-west1'
  _PLATFORM: 'managed'
  _AR_HOSTNAME: 'europe-west1-docker.pkg.dev'
  _AR_PROJECT_ID: 'medicfamily'
  _AR_REPOSITORY: 'cloud-run-source-deploy'
  _GOOGLE_CLIENT_ID: '42291566189-2p24cnmnjko9je8auqcv1mmavgrrik84.apps.googleusercontent.com'

options:
  logging: CLOUD_LOGGING_ONLY
