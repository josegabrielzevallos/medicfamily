steps:
  # ─────────────────────────────────────────
  # BACKEND
  # ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/medicfamily-backend'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', 'gcr.io/$PROJECT_ID/medicfamily-backend']
    waitFor: ['build-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medicfamily-backend'
      - '--image=gcr.io/$PROJECT_ID/medicfamily-backend'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=^|^DEBUG=False|SECRET_KEY=${_SECRET_KEY}|DB_ENGINE=django.db.backends.postgresql|DB_NAME=${_DB_NAME}|DB_USER=${_DB_USER}|DB_PASSWORD=${_DB_PASSWORD}|DB_HOST=${_DB_HOST}|DB_PORT=5432|ALLOWED_HOSTS=.run.app'
      - '--min-instances=0'
      - '--max-instances=5'
    waitFor: ['push-backend']

  # ─────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/medicfamily-frontend'
      - '--build-arg'
      - 'REACT_APP_API_URL=${_BACKEND_URL}/api'
      - './frontend'
    waitFor: ['deploy-backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', 'gcr.io/$PROJECT_ID/medicfamily-frontend']
    waitFor: ['build-frontend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medicfamily-frontend'
      - '--image=gcr.io/$PROJECT_ID/medicfamily-frontend'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=5'
    waitFor: ['push-frontend']

images:
  - 'gcr.io/$PROJECT_ID/medicfamily-backend'
  - 'gcr.io/$PROJECT_ID/medicfamily-frontend'

substitutions:
  _SECRET_KEY: 'cambiar-en-produccion'
  _DB_NAME: 'medicfamily'
  _DB_USER: 'postgres'
  _DB_PASSWORD: 'admin123'
  _DB_HOST: '127.0.0.1'  # Cloud SQL usa /cloudsql/INSTANCE_CONNECTION_NAME
  _BACKEND_URL: 'https://medicfamily-backend-REEMPLAZAR.run.app'

options:
  logging: CLOUD_LOGGING_ONLY
